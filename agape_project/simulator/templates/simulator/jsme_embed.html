{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSME</title>
=
  <script src="{% static 'frontend/JSME/jsme/jsme.nocache.js' %}"></script>

  <style>
    html, body { margin: 0; padding: 0; }
    #jsme_container { width: 100%; height: 200px; }
  </style>

  <script>
    let jsmeApplet = null;

    function jsmeOnLoad() {
      jsmeApplet = new JSApplet.JSME("jsme_container", "100%", "420px", {
        options: "oldlook"
      });

      function pushSmiles() {
        try {
          const smiles = jsmeApplet.smiles();
          window.parent.postMessage({ type: "JSME_SMILES", smiles }, "*");
        } catch (e) {}
      }

      if (jsmeApplet.setCallBack) {
        jsmeApplet.setCallBack("AfterStructureModified", pushSmiles);
      } else {
        setInterval(pushSmiles, 800);
      }
    }
  </script>
</head>
<body>
  <div id="jsme_container"></div>
</body>
</html>
