{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JSME Atom Highlight</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
    crossorigin="anonymous"
  />
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>

  <!-- JSME Library -->
  <script src="{% static 'frontend/jsme/jsme.nocache.js' %}"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="{% static 'frontend/styles/styles.css' %}">

  <style>
    em {
      background-color: rgb(102, 255, 255);
    }
  </style>

  <script>
    var jsmeApplet;  // Use var to avoid redeclaration errors

    function jsmeOnLoad() {
      jsmeApplet = new JSApplet.JSME("jsme_container", "100%", "340px", {
        options: "oldlook,marker,markAtomOnly,nocanonize"
      });
      jsmeApplet.setCallBack("AfterStructureModified", show_smiles);
    }

    function show_smiles(event) {
      const patt = /\[([A-Za-z][a-z]?)H?\d*:\d+\]/g;
      const smiles = event.src.smiles();
      const new_smiles = smiles.replace(patt, '<em>$1</em>');
      document.getElementById("smiles_container").innerHTML = new_smiles;
    }
  </script>
</head>

<body>
  <div class="container py-4">
    <div id="jsme_container"></div>

    <form class="mt-3">
      <label class="notranslate" translate="no">
        <input
          type="checkbox"
          onchange="jsmeApplet.options(this.checked ? 'canonize' : 'nocanonize'); show_smiles({ src: jsmeApplet })"
        >
        Canonical SMILES
      </label>
    </form>

    <p class="mt-3">
      <strong class="notranslate" translate="no">
        SMILES:
      </strong>
      <span id="smiles_container"></span>
    </p>
  </div>
</body>
</html>
